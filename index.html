<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geração Inabalável</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000 url('capa.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100vh;
        }
        .login-container {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-top: 3px solid #7b0000;
            text-align: center;
        }
        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }
        button {
            width: 85%;
            padding: 15px;
            background: #7b0000;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>IDENTIFIQUE-SE</h2>
        <input type="text" id="nomeJovem" placeholder="Seu Nome">
        <button onclick="entrar()">INICIAR MISSÃO</button>
    </div>

    <script>
        function entrar() {
            const nome = document.getElementById('nomeJovem').value;
            if(nome) {
                localStorage.setItem('jovem_nome', nome);
                window.location.href = "1.html";
            } else {
                alert("Digite seu nome para começar!");
            }
        }

        // Registro do Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
