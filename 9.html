<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Inabalável - Login</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; }
        
        .login-container { padding: 40px 25px; text-align: center; width: 100%; max-width: 400px; box-sizing: border-box; }
        
        .logo-small { width: 80px; margin-bottom: 20px; }
        
        h2 { color: #ffff00; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-size: 1.5rem; }
        p { color: #ccc; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #ffff00; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        
        input[type="password"] {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 2px solid #333;
            color: #fff;
            font-size: 1.1rem;
            border-radius: 5px;
            outline: none;
            box-sizing: border-box;
            text-align: center;
            letter-spacing: 5px;
        }
        
        input[type="password"]:focus { border-color: #d35400; }

        .btn-acessar {
            width: 100%;
            padding: 20px;
            background: #d35400;
            color: white;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-acessar:hover { background: #e67e22; }
        
        #erro { color: #ff4d4d; font-size: 0.85rem; margin-top: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="logo-512.png" alt="Inabalável" class="logo-small">
        
        <h2>Missão Inabalável</h2>
        <p>Insira a credencial para iniciar a dinâmica final.</p>

        <div class="input-group">
            <label>Senha de Acesso</label>
            <input type="password" id="senha" placeholder="••••••">
        </div>

        <button class="btn-acessar" onclick="validarAcesso()">Iniciar Missão 🏁</button>
        
        <p id="erro">⚠️ Senha incorreta. Tente novamente.</p>
    </div>

    <script>
        function validarAcesso() {
            const senhaInserida = document.getElementById('senha').value;
            const erroMsg = document.getElementById('erro');
            
            if (senhaInserida === 'mt2026') {
                // Redireciona para o 10.html (A Dinâmica)
                window.location.href = '10.html';
            } else {
                erroMsg.style.display = 'block';
                document.getElementById('senha').value = '';
                // Pequena vibração para erro (em dispositivos móveis)
                if (navigator.vibrate) navigator.vibrate(200);
            }
        }

        // Permitir dar "Enter" no teclado
        document.getElementById('senha').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                validarAcesso();
            }
        });
    </script>

</body>
</html>
